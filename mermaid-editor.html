<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mermaid.js Inline Editor</title>
    <!-- Tailwind untuk styling sederhana -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Mermaid.js -->
    <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
        mermaid.initialize({ startOnLoad: false, theme: 'default' });

        window.renderMermaid = async function() {
            const code = document.getElementById('editor').value;
            const output = document.getElementById('output');
            try {
                const { svg } = await mermaid.render('mermaid-svg', code);
                output.innerHTML = svg;
                document.getElementById('error').innerText = '';
            } catch (err) {
                document.getElementById('error').innerText = err.message;
            }
        };

        // Render pertama kali
        document.addEventListener('DOMContentLoaded', () => {
            window.renderMermaid();
        });
    </script>
</head>
<body class="bg-gray-100 p-6 h-screen flex flex-col">
    <h1 class="text-2xl font-bold mb-4">Mermaid.js Inline Editor</h1>
    <div class="flex gap-4 h-full">
        <!-- Text Editor -->
        <div class="w-1/2 flex flex-col">
            <h2 class="text-lg font-semibold mb-2">Editor (Edit di sini)</h2>
            <textarea id="editor" class="w-full h-full p-4 font-mono text-sm border border-gray-300 rounded shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500" oninput="window.renderMermaid()">
erDiagram
    users {
        int id PK
        varchar nama
    }
    client_access {
        int user_id PK, FK
        boolean kepsek
    }
    users ||--o| client_access : "memiliki hak akses"
            </textarea>
        </div>

        <!-- Live Preview -->
        <div class="w-1/2 flex flex-col">
            <h2 class="text-lg font-semibold mb-2">Live Preview</h2>
            <div class="bg-white p-4 w-full h-full border border-gray-300 rounded shadow-sm overflow-auto flex items-center justify-center">
                <div id="output"></div>
            </div>
            <div id="error" class="text-red-500 text-sm mt-2 font-mono h-10 overflow-hidden"></div>
        </div>
    </div>
</body>
</html>
